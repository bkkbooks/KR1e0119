body:
  text: 三正考春秋類提要臣等謹案三正考二卷國朝吳鼐撰鼐字大年無錫人乾隆丙辰進士官工部主事春秋以周正紀時原無疑義至宋儒泥行夏之時一言遂是非蠭起明張以寧著春王正月考李濂著夏周正辨疑而經義始明鼐復取兩家之説節其繁冗益以近儒所論補所未備駁胡氏蔡氏改月不改時及諸儒時月俱不改之説以明左氏王周正月之㫖辨證極有根據其中三正通于民俗一條所引陳廷敬蔡徳晉諸説於三代諸書所紀年月差互之處一一剖其所以然更足以破疑似之見雖篇帙無多而引證詳明判百年紛紜轇轕之論于經學實深有功焉乾隆四十四年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀三正考改時改月圖夏正建寅商正建丑周正建子秦正建亥及太初正厯之後追改秦厯原委合為一圖子月夏十一仲冬商十二季冬周正孟春秦二仲春太初厯改為秦十一月丑月夏十二季冬商正孟春周二仲春秦三季太初厯改為春秦十二月寅月夏正孟春商二仲春周三季春秦四孟夏太初厯改為秦正月卯月夏二仲春商三季春周四孟夏秦五仲夏太初厯改為秦二月辰月夏三季舂商四孟夏周五仲夏秦六季夏太初厯改為秦三月巳月夏四孟夏商五仲夏周六季夏秦七孟秋太初厯改為秦四月午月夏五仲夏商六季夏周七孟秋秦八仲秋太初厯改為秦五月未月夏六季夏商七孟秋周八仲秋秦九季秋太初厯改為秦六月申月夏七孟秋商八仲秋周九季秋秦十孟冬太初厯改為秦七月酉月夏八仲秋商九季秋周十孟冬秦十一仲冬太初厯改為秦八月戌月夏九季秋商十孟冬周十一仲冬秦十二季冬太初厯改為秦九月亥月夏十孟冬商十一仲冬周十二季冬秦正孟春太初厯改為秦十月
