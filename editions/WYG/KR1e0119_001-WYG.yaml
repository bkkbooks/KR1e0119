body:
  text: 三正考卷一工部主事呉鼐撰造厯之初建子史記索隱黄帝建子鼐按黄帝命大撓作甲子以四甲子為厯元則是建子無疑也若建寅則四甲子乃在癸亥嵗之十一月唐虞建寅堯典日中星鳥以殷仲春日永星火以正仲夏宵中星虚以殷仲秋日短星昴以正仲冬鼐按仲春建卯仲夏建午仲秋建酉仲冬建子則知堯正之建寅也舜巡守二月東五月南八月西十一月北四仲各依其方則知舜正之建寅也鄭康成謂堯正建子舜正建丑髙堂隆謂舜更堯厯首嵗以子堯同少昊首嵗以亥都無據夏正建寅逸周書夏數得天百王所同其在商湯順天革命改正朔亦越我周王致伐於商改正異械以垂三統至於敬授民時巡守祭享猶自夏焉張氏以寧曰黄帝始造甲子而建子至顓頊始建寅而唐虞夏因之逮於商復建丑周復建子月旣為正而時亦隨之以為春然商周之春天施地化之義也若夫人事之紀則當以夏時之春為正農事之耕耘収藏田政之蒐苗獮狩祭典之祠禴烝嘗皆不能不以夏時何也麥稻之薦魚鮪之獻與夫膏豚之行膏香之膳四時不同必以時物故也所謂巡守祭享猶自夏焉者也論語顔淵問為邦子曰行夏之時朱子曰夏時謂以斗柄初昏建寅之月為嵗首也天開于子地闢于丑人生於寅故斗柄建此三辰之月皆可以為嵗首而三代迭用之夏以寅為人正商以丑為地正周以子為天正也然時以作事則嵗月自當以人為紀故孔子嘗曰吾得夏時焉而說者以為夏小正之屬葢取其時之正與其令之善也鼐按時者春夏秋冬也周之時以子月為春不如夏之時以寅月為春也言時則月在其中矣商正建丑漢書律厯志商十二月乙丑朔旦冬至張氏以寧曰冬至在十二月則以為夏正十二月不可也葢商正十二月也鼐按據前漢書商自改丑月為正月不曰日南至曰冬至者後世之辭也後漢書陳寵傳丑月陽氣上通地以為正殷以為春鼐按據後漢書商自改丑月為孟春伊訓惟元祀十有二月乙丑伊尹祠於先王奉嗣王祗見厥祖侯甸羣后咸在百官總己以聽冢宰序曰成湯旣沒太甲元年孔傳曰此湯崩踰月太甲即位奠殯而告也孔疏曰殷家猶質踰月即改元年以明世異不待正月以為首也朱氏鶴齡曰湯崩而太甲即位改元此古注也蔡傅引蘓氏説以崩年改元為亂世事然商人尚質安見必無歐陽永叔云人君即位稱元年常事耳古不以為重也凡記事先後逺近莫不以嵗月一二數之其謂一為元亦未嘗有意呉淵穎亦云王者始得天下聞改正朔未聞改元伊訓稱元祀春秋書元年直史官紀述之常體耳將以志人君在位之久近也非王者以是為重事也據此則子瞻所云不必引矣十有二月孔氏以為商王之建丑月是也鼐按據注疏未嘗以伊訓之十有二月為歲首也太甲中惟三祀十有二月朔伊尹以冕服奉嗣王歸於亳孔傳湯以元年十一月崩至此二十六月三年服闋張氏敷言曰後世嗣王冕服考之顧命固有常儀何待正月而放桐之事又人臣大變朝而自怨夕當復辟尤無待於正月也蔡氏德晉曰時湯崩至此已二十五月當行祥祭商尚質是月喪畢當除服故即以冕服迎歸且明年四祀正月朔當有朝正見羣臣諸大事桐在亳都外若必俟正月朔始迎歸必有所不及故先於嵗終月朔迎歸亦理勢當然而非商以十二月為嵗首也鼐按據注疏未嘗以太甲中之十有二月為嵗首也又按胡傳既誤引兩十二月以證其不改月之説趙東山又誤駁古文尚書以申其改月之説兩失之矣按日知録惟元祀十有二月乙丑元祀者太甲之元年十有二月者建子之月蓋湯之崩必以前年之十二月也殷練而袝伊尹祠於先王奉嗣王祗見厥祖袝湯於廟也先君袝廟而後嗣子即位故成之為王而伊尹乃明言烈祖之成德以訓於王也若自桐歸亳以三祀之十二月者則適當其時而非有所取爾此説亦似是而非孟子謂伊尹放之於桐三年如顧氏説則已四年矣倘終喪而未克變則太甲中不應没其文也蓋惑於蘓氏之駁而遷就其説以從之耳非有所據也周正建子春秋隱公元年春王正月左傳元年春王周正月杜注言周以别夏殷公羊何注曰二月三月皆有王者二月殷之正月三月夏之正月也王氏守仁曰周不改月與時春秋必不書春王正月春秋書春王正月則其改月與時又何疑焉顧氏炎武曰左傳春王周正月此古人解經之善後人辨之累數百千言而未明者傳以一字盡之矣鼐按三代改時改月之説晉唐以前諸儒無異論自伊川先生發其端胡氏據之以釋春秋蔡氏據之以釋書後之依聲附和者家氏鉉翁程氏端學尤為害理夫左氏説經固有出入然以周人記周正有何疑誤而家氏程氏苦為攻擊亦見其惑矣三代改時之證左傳昭十七年夏六月朔日有食之太史曰今六月當夏四月是謂孟夏鼐按此言周之季夏夏之孟夏也此為改時之明證三代改月之證左傳昭十七年梓愼曰火出於夏為三月於商為四月於周為五月僖五年正月辛丑朔日南至家語辨物篇季康子問於孔子曰今周十二月夏之十月鼐按此為改月之明證冬不可為春辨後漢書陳寵奏曰夫冬至之節陽氣始萌故十一月有蘭射干芸荔之應時令曰諸生蕩安形體天以為正周以為春十二月陽氣上通雉雊雞乳地以為正殷以為春十三月陽氣已至天地已交萬物皆出蟄蟲始振人以為正夏以為春三微成著以通三統張氏以寧曰自子丑以至戌亥月行之所㑹其在天者有恒度斗杓之所建其在地以應乎天者有定分此萬古不易者也若其始於春而終於冬始於正而終於十二者在天固未嘗先有如是之名與數也亦在乎受命改物者從而命之數之耳且以春之義言之春者蠢也言陽氣之蠢而動也子丑寅三陽之月也故三代迭用之以為春非若建亥純隂之月不可以為春也王氏守仁曰陽生於子而極於己午隂生於午而極於亥子陽生而春始盡於寅而猶夏之春也隂生而秋始盡於申而猶夏之秋也自一陽之復以極於六陽之乾而為春夏自一隂之姤以極於六隂之坤而為秋冬此文王之所演而周公之所繫也鼐按文王繫乾曰元亨利貞元者於時為春於月為子為丑為寅於律為黄鍾為大呂為大蔟於卦氣為復為臨為泰亨者於時為夏於月為夘為辰為巳於律為夾鍾為姑洗為中呂於卦氣為大壯為夬為乾利者於時為秋於月為午為未為申於律為㽔賔為林鍾為夷則於卦氣為姤為遯為否貞者於時為冬於月為酉為戌為亥於律為南呂為無射為應鍾於卦氣為觀為剝為坤此文王之所演而武周本之以制禮也商周分至不繫時禮記月令仲春之月日夜分仲夏之月日長至仲秋之月日夜分仲冬之月日短至蔡氏德晉曰子月一陽生而周以為春午月一隂生而周以為秋於理無不合惟二分二至夏正皆以四時繫之而商周皆不繫時左傳於冬至則曰日南至於春秋分則曰日中禮記於夏至則曰日長至於冬至則曰日短至於二分則曰日夜分蓋二至以日行長短之極得名二分以日夜適中得名原無闗於春夏與秋冬也鼐按月令本據夏正此云二分二至夏正皆以四時繫之亦後世之辭也按家則堂曰以子丑寅為春午未申為秋四序紛錯中節皆紊建子月立春則建丑月可得為春分乎建午月立秋則建未月可得為秋分乎春秋分者本謂晝夜等寒暑中今以窮冬盛夏為春秋分晝夜可得而均乎寒暑可得而中乎余應之曰惟不可得為春秋分故曰日夜分三正通於民俗夏書怠棄三正馬氏融曰建子建丑建寅三正也蔡注曰三正子丑寅之三正也怠棄不用夏之正朔也此見三正迭建其來乆矣子丑之正唐虞之前當已有之陳氏廷敬曰有扈氏不畏天不恤人故雖頒寅正而兼言三正者所以深責之也呂氏祖謙曰豳詩陳先公風化而載其言曰嗟我婦子曰為改嵗入此室處則三正之通於民俗尚矣商周特舉而迭用之耳蔡氏德晉曰三正之見於六經者參錯不一惟春秋純用周正以史官記事當用王朝正朔也周禮純用夏正以夏數得天百王所同故周之敬授民時巡狩祭享猶自夏焉周禮正授時祭享之書也其正嵗即正月而凌人掌冰政之政不應改為正也論語用夏正莫春者春服既成是也孟子用周正七八月旱則苗槁及徒杠輿梁成於十一月十二月是也周易臨彖八月有凶用周正也説卦傳兌正秋也則用夏正也書唐虞夏皆夏正商用商正周用周正而甘誓言怠棄三正是夏並用三正也盤庚乃亦有秋是商兼用夏正也金縢秋大熟君牙夏暑雨冬祁寒是周亦兼用夏正也詩皆用夏正而豳風言民俗在夏商之交乃有一之日至四之日及十月改嵗之語是亦兼用周正也左傳叙事用周正而僖五年晉卜偃以童謠推虢之亡謂在九月十月之交是亦用夏正也禮記月令用夏正而季秋為來嵗受朔日亦用周正也蓋因制近者於十二月頒朔逺者於十一月頒之也雜記引孟獻子言正月日至可以有事於上帝七月日至可以有事於祖亦用周正也若是其參錯不一何哉九峯書甘誓之傳曰三正迭建其來乆矣子丑之建唐虞之前當已有之東萊詩豳風之紀曰三正通於民俗尚矣二説固然抑又有説焉先王立一代之法於前代典章兼存不廢其焦薊英六祝陳杞宋之封皆所以使其子孫各修先代之禮物至於朝野所奉行則祭祀備六代之舞養老具三代之禮士喪兼三代之祝魯用四代之服器官蓋聖人以德化民惟欲納之於至善初不必廢棄禁絶前代之典章以自伸也故三代時自伏羲甲厯以至神農黄帝少昊顓頊帝嚳堯舜之厯具存而可考觀於秦政坑焚操懿兵燹而杜預所見十厯自黄帝顓頊以及三代之厯猶在則其前可知也夫黄帝調厯建子伏羲顓頊之厯建寅若神農少昊諸厯今雖不可考當必有建丑者鄭康成謂堯正建丑舜正建子縱未可信然唐虞前已有三正之建無疑也三正旣為歴代所迭用復為本朝所兼存故誥誓臣民並言之而不以為雜秉筆之史臣臨文之學士隨意書之而亦不以為倍也此六經之言三正所以參錯不一律也歟顧氏炎武曰三正之名見於甘誓蘓氏以為自舜以前必有以建子建丑為正者其來尚矣微子之命曰統承先王修其禮物則知杞用夏正宋用殷正若朝覲㑹同則用周之正朔其於本國自用其先王之正朔也惟晉為姬姓之國而用夏正則不可解三正之所以異者疑古之分國各有所受故公劉當夏后之世而一之日二之日已用建子為紀晉之用寅其亦承唐人之舊歟杜預春秋後序曰晉太康中汲縣人發其界内舊冡得古書皆簡編科斗文字記晉國起自殤叔次文侯昭侯以至曲沃莊伯莊伯之十一年十一月魯隱公之元年正月也皆用夏正建寅之月為嵗首今考春秋僖公五年晉侯殺其世子申生經書春而傳在上年之十二月十年里克弑其君卓經書正月而傳在上年之十一月十一年晉殺其大夫㔻鄭父經書春而傳在上年之冬十五年晉侯及秦伯戰於韓獲晉侯經書十有一月壬戌而傳則為九月壬戌經傳之文或從夏正或從周正所以錯互如此與史記漢元年冬十月五星聚東井乃秋七月之誤正同僖公五年十二月丙子朔虢公醜奔京師而卜偃對獻公以為九月十月之交襄公三十年絳縣老人言臣生之嵗正月甲子朔以長厯推之為魯文公十一年三月甲子朔此又晉人用夏正之見於傳者也僖公二十四年冬晉侯夷吾卒杜氏注文公定位而後告夫不告文公之入而告惠公之薨以上年之事為今年之事新君入國之日反為舊君即世之年非人情也疑此經乃錯簡當在二十三年之冬傳曰九月晉惠公卒晉之九月周之冬也隱公六年冬宋人取長葛傅作秋劉原父曰左氏日月與經不同者邱明作書雜取當時諸侯史策之文其用三正參差不一往往而迷故經所云冬傳謂之秋也考宋用殷正則建酉之月周以為冬宋以為秋矣桓公七年夏穀伯綏來朝傳作春劉原父曰傳所据者以夏正紀時也文公十六年齊公子商人弑其君舍經在九月傳作七月隱公三年夏四月鄭祭足帥師取溫之麥秋又取成周之禾若以為周正則麥禾皆未熟四年秋諸侯之師敗鄭徒兵取其禾而還亦在九月之上是夏正六月禾亦未熟注云取者葢芟踐之終是可疑按傳中雜取三正多有錯誤左氏雖𤼵其例于隱之元年曰春王周正月而間有失於改定者文多事繁固著書之君子所不能免也鼐按此數條之說可以破紛紜糾葛之疑秦正建亥顧氏炎武曰胡氏引秦人以亥為正不改時月為証則不然漢書髙帝紀春正月注師古曰凡此諸月號皆太初正厯之後記事者追改之非當時本稱也以十月為嵗首即謂十月為正月今此真正月當時謂之四月耳他皆類此叔孫通傳諸侯羣臣朝十月師古曰漢時尚以十月為正月故行朝嵗之朝史家追書十月漢元年冬十月五星聚東井當是建申之月劉攽曰按厯太白辰星去日率不過一兩次今十月而從嵗星於東井無是理也然則五星以秦之十月聚東井耳秦之十月今七月日當在鶉尾故太白辰星得從歲星也按此足明記事之文皆是追改惟此一事失於追改遂以秦之十月為漢之十月耳夫以七月誤為十月正足以為秦人改月之証胡氏失之鼐按先儒主改時改月之説者動云此秦自為一代之制殊不足以折胡傳之謬夫商周之改時改月既確有可證矣自夏迄秦歴千餘年間無復夏時之事而秦忽逺從夏之冬十月以為嵗首乎此不可解也得顧氏説始豁然於秦之建亥未始不改時月也真足破千載不决之疑矣三正考卷一
