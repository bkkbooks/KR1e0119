body:
  text: 三正考卷二工部主事吳鼐撰邵公之誤哀十四年春西狩獲麟公羊傳何注曰河陽冬言狩獲麟春言狩者蓋據魯變周之春以為冬去周之正而行夏之時趙氏汸曰以行夏之時説春秋蓋昉於此然何氏固以建子為周之春但疑春不當言狩而妄為之辭鼐按狩者仲冬圍守取物之名周之孟春夏之仲冬也謂春不當言狩何耶經言春不言冬安得謂變周之春以為冬也吾不識所變者何春所去者何正所行者何時也河南之誤伊川經説曰周正月非春也假天時以立義爾朱子曰此以春字為夫子所加但魯史本謂之春秋則又似元有春字趙氏汸曰假天時以立義此胡氏夏時冠周月之所從出也鼐按程子之説以周為改月不改時魯史本書冬正月冬二月春三月而夫子改為春正月春二月春三月也如此則周本以寅卯辰為春與夏時同夫子反以子丑寅為春與夏時異也一誤於周之不改時再誤於孔子之改周時而後儒之紛紜糾葛從此起矣武夷之誤胡傳曰按左氏王周正月周人以建子為歲首則冬十有一月是也前乎周者以丑為正其書始即位曰惟元祀十有二月則知月不易也後乎周者以亥為正其書始建國曰元年冬十月則知時不易也建子非春亦明矣乃以夏時冠周月何哉聖人語顔回以為邦則曰行夏之時作春秋以經世則曰春王正月此見諸行事之驗也或曰非天子不議禮仲尼有聖德無其位而改正朔可乎曰有是言也不曰春秋天子之事乎以夏時冠月垂法後世以周正紀事示無其位不敢自專也其旨微矣楊龜山答胡康侯書曰正朔必自天子出改正朔恐聖人不為也若謂以夏時冠月如定元年冬十月隕霜殺菽若以夏時言之則十月隕霜乃其時也不足為災異周十月乃夏之八月若以夏時冠月當曰秋十月也鼐按言魯史原文當為秋十月也正朔如建子丑是也用夏時月不可謂改正朔趙氏汸曰據胡氏所引商秦不改月為證是周亦未嘗改月據夏時冠周月是孔子始改時又云仲尼無其位而改正朔則是正月亦皆孔子所改其舛誤最甚蓋由所見未明而欲含糊兩端故雖主周正而又疑于時之不可改既主夏時而亦疑于建子之非春是以徒費心思而進退無據其誤在于兼取用夏從周是欲兩可而不知理實不通陳氏廷敬曰胡氏引左氏王周正月之説而論之曰周人以建子為歲首則冬十有一月是也是明以周正月之説為是謂冬十一月為周正月矣而又曰前乎周者書元祀十有二月則知月不易也則是前乎周者未嘗改月至周始改其歲首之月為正月也夫殷不改月而周始改月考之經傳未有明文胡氏之意亦殆不謂然也其意若以謂建子為嵗首耳然明引左氏王周正月之文矣而又斷以為冬十有一月者不知胡氏之意進退何所據乎又曰後乎周者時不易胡氏之意非遂謂漢不易時而周獨易時也其意不過謂周不易時取漢以為證耳故下文曰建子非春亦明矣是胡氏不主改時之説也其又曰乃以夏時冠周月何哉云者是胡氏亦知周果改十一月為正月矣特未便以為春是周之正月乃夏之十一月仍為夏正之冬也孔子作春秋取春之一字加於周正月之上耳是胡氏之意也故下文又曰聖人語顔回以為邦則曰行夏之時作春秋以經世則曰春王正月此見諸行事之驗于是而胡氏之誤更有不可勝言者矣夫周之月建子之月也建子非春胡氏自言之矣使周果不改時而孔子作春秋以建子非春之月強取春之一字加於其上此乃天時所不受牧兒藝叟所聞而怪笑者也曽謂孔子而為之乎行夏之時子有是言矣假使周而果不改時也則建子之月儼然冬也冬則正夏之時也夏之時曰冬孔子書之曰春是周本行夏之時而孔子乃變夏之時矣行夏之時者果嘗若是乎假使孔子之于春秋果寓行夏時之意而周果不改時也則建子之月必將直書之曰冬使後之人猶得有所考而正焉曰周之不改時如此也以子月為正月如此也其不若夏寅月之為正月如此也後之人由此考正而行夏之時焉豈不甚明白矣乎而顧冬而書春曰吾欲行夏之時寧有是理乎又其論曰以夏時冠月垂法後世以周正紀事示無其位不敢自專假使孔子果以夏時冠月則亦何難以夏正紀事時可自專月獨不可自專乎夫春夏秋冬之時自正至十二之月以為可改則皆可改以為不可改則皆不可改也今改夏之冬為春曰將以垂法後世不改周之子月為十一月曰吾無其位不敢自專無其位而改冬為春冬必不可為春也不可為春者而悍然命之為春無其位者又敢自專如此乎且使後之人何所取法乎而謂以此垂法後世者其果何法之垂也書云王省惟嵗卿士惟月師尹惟日言以歲月日之大小别王及卿士師尹之尊卑也今謂夫子改時不改月是敢于其大而不敢于其小也聖人豈有是乎至其謂夫子有聖德無其位而改正朔夫正者正月朔者月朔也如胡氏説則正月亦夫子所改矣吾不知胡氏所謂正朔者果何所指也聖人之言語文章皆具光明正大之心其語顔子則正告以為邦之事其作春秋則直書以魯史之文亦何至如後儒支離剝割之見巧為新意於其間哉湯氏斌曰如胡氏之説周改月不改時是雖以子月為歲首而四時之序猶夫夏也以冬為春乃自孔子始以夏時冠周月非所以尊周以仲冬為孟春豈可謂行夏之時乎不夏不周之間孔子何以自處焉春秋天子之事謂賞功討罪以明天子之法使諸侯不敢悖天子大夫不敢悖諸侯非必變易四時之序改本朝正朔而後為天子之事也胡氏以為垂法後世吾恐法未可垂而先犯為下不倍之戒矣且此亦空言耳安在其為見諸行事之驗乎鼐按胡氏之説同程子亦以周正本改月不改時冬正月魯史之舊文春字乃夫子之特筆也趙氏陳氏之説曲盡其情以子矛刺子盾不必旁引博證以駁之也朱子曰如胡傳之説周亦未嘗改月而孔子特以夏正建寅之月為歲首月下所書之事却是周正建子月事自是之後月與事常差兩月聖人制作不如是之紛更煩擾錯亂無章也文定以夏時冠周月以周正紀事謂如公即位依舊是十一月只是孔子改作春正月某便不敢信湯氏玉翎曰胡氏謂春王正月本周之十一月而夫子以夏時冠周月以周正紀事夫周十一月而曰正月是作史者之正月烏在其為王正月也曰王正月而所紀者周十一月之事烏在其為周正紀事也所紀周十一月之事而冠以春正月是以夏時夏月冠周事烏在其為夏時冠周月也鼐按此駁胡氏之以周正為不改月不改時魯史本書冬十一月而夫子改為春正月也或問駁胡傳者或駁其改月不改時或駁其時月皆不改不識胡氏之宗主何如也曰吾嘗考諸他傳矣桓八年春正月己卯蒸胡傳曰夏數得天百王所同商周改正巡狩蒸享猶自夏焉然則司馬中冬教大閲獻禽以享蒸所謂自夏而魯之蒸祭在春正月見春秋用周正紀魯事也十四年秋八月乙亥嘗胡傳曰春秋紀事用周月而以八月嘗則不時也據此二傳則正月之蒸為夏十一月八月之嘗為夏六月是胡氏之明以周正為改月也春王正月傳謂左氏王周正月周人以建子為嵗首則冬十有一月是也言周正月建子即夏正之冬十有一月也與此二傳正相發明然胡氏既以周正為改月矣又引元祀十二月而曰月不易又謂春秋天子之事故孔子改周之正朔則乂似乎周正本不改月而夫子改之也故以魯史本書冬十一月而夫子改為春正月之説亦歸胡氏其實胡氏之宗旨則不爾也陳氏廷敬言之詳矣九峯之誤書蔡注曰三代雖正朔不同然皆以寅月起數蓋朝覲會同頒厯授時則以正朔行事至于紀月之數則皆以寅為首也惟十有三年春漢孔氏以為建子之月四時改易猶為無藝冬不可為春寒不可為暖不待辨而明也鼐按此主不改時月之説辨已見前永嘉之誤陳氏傅良曰以夏時冠周月魯史也夫子修春秋每孟月書時以見魯史每正月書王以存周正蓋尊周而罪魯也李氏廉曰以東遷之後天子不協時月侯國不奉正朔故魯改厯即十一月為春夫子因而書之以罪魯之俶擾天紀其説無據汪氏克寬曰謂周雖改月數而不改夏時春秋四時之序皆魯厯所更然夫子之時猶存告朔之餼羊則魯實承周之正朔未嘗改厯後世所稱魯厯特因春秋而逆推之耳鼐按陳永嘉之説謂周正建子本改月不改時魯史亦建子而時月皆改也春秋則因舊史而不革此蓋惑於冬不可為春之説而歸其咎於魯也夏時冠周月之説至此愈出愈竒矣夫子行夏時之説不識魯史何以預知之四明之誤程氏端學曰古者君喪嗣子踰年始即位改元必在所建之歲首周王與諸侯即位亦當在十有一月何獨春秋在建寅即位乎及考唐志春秋時晉魯宋各自有厯法當獻惠之世大抵皆用夏正由是知春秋時魯公不奉周王正朔不於建子十一月即位而以建寅正月即位故孔子因舊史而不革直書之以見當時之僭亂鼐按程四明之説謂周正建子本時月皆不改魯史則建寅而時月悉與周正異也春秋則因舊史而不革蓋惑于胡氏前乎周後乎周俱不改時月而以孔子為改時王之正朔又為諸家所排擊故遷就其辭而為此説也四明辨周正幾至數千萬言而其宗旨不過如此亦見其陋矣涇野之誤呂氏柟曰春王正月者即夏之春正月耳周雖以冬十一月為正朔也孔子修春秋則斷自春正月紀之故曰行夏時也既以夏正紀事則即位可書於此以開後事也鼐按此以魯史本從周正冬十一月為嵗首而孔子於每年截去子丑月移在前一年而以周之春正月為始也周之春正月即夏正建寅之月周本以此為第三月而夫子截去兩月以從夏正故曰行夏時也此蓋惑於胡氏前乎此後乎此皆不改時月之説而又不欲以一春字虛加於子月之上故小變其法而為此説也抑不思周既以冬十一月為嵗首則公即位亦當書於十一月今乃以子月之即位者移于寅月而又以本年之子月丑月移於前一年月則愈移而愈前事則愈移而愈後殆所謂無稽之言也歟夏時冠周月之説至永嘉而怪斯極矣行夏時之説至涇野而怪斯極矣三正考卷二
